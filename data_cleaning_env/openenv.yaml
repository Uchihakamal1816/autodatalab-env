spec_version: 1
name: autodatalab_data_cleaning
type: space
runtime: fastapi
app: data_cleaning_env.server.app:app
port: 7860

description: >
  E-commerce data analyst workflow: deduplicate order records, impute missing prices,
  remove price outliers, derive Revenue, validate business rules, compute KPIs,
  and declare charts. Five tasks across easy→expert difficulty, deterministic grading
  against analyst ground-truth CSVs with dense intermediate reward shaping and a
  real-time data_quality_score signal in every observation.

tags:
  - openenv
  - data-cleaning
  - ecommerce
  - reinforcement-learning
  - pandas

tasks:
  - id: easy
    difficulty: easy
    summary: >
      Remove duplicate orders and impute missing Price with the column mean.
      ExpiryDays surfaces as a governance warning but is not a required transform.
  - id: medium
    difficulty: medium
    summary: >
      Pre-cleaned order data is given. Run compute_metrics to produce a
      category-level Revenue aggregation table (Category, Revenue).
  - id: medium_plus
    difficulty: medium
    summary: >
      Pre-cleaned order data is given. Run compute_kpis to produce a KPI
      summary table (TotalRevenue, AvgOrderValue). Tests scalar business metric extraction.
  - id: hard
    difficulty: hard
    summary: >
      Full cleaning pipeline: deduplicate, impute missing Price (mean), remove Price outliers
      (MAD z ≤ 2.5), derive Revenue = Price × Quantity, then declare two plots —
      Revenue vs OrderDate (scatter) and Category vs Revenue (bar).
  - id: expert
    difficulty: expert
    summary: >
      Expert pipeline: all hard steps plus validate_schema (Price > 0, Quantity ≥ 1,
      OrderDate parseable), compute_kpis (TotalRevenue + AvgOrderValue), and three plots —
      Revenue vs OrderDate (scatter), Category vs Revenue (bar), Product vs Revenue (bar).
      Tests frontier models on multi-step, multi-objective data engineering.
